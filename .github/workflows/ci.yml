name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, pgsql]
    name: PHP 8.4 / Pest · ${{ matrix.db }}

    # Each matrix entry overrides the DB connection; Postgres runs inside a
    # service container, SQLite uses the in-repo file.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     cihrms
          POSTGRES_PASSWORD: cihrms
          POSTGRES_DB:       cihrms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cihrms"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_CONNECTION: ${{ matrix.db }}
      # SQLite path is set inline below; pgsql values come from the service container.
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: ${{ matrix.db == 'pgsql' && 'cihrms_test' || 'database/database.sqlite' }}
      DB_USERNAME: cihrms
      DB_PASSWORD: cihrms

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, mbstring, pdo, pdo_sqlite, sqlite3, pdo_pgsql, pgsql, gd, intl
          coverage: none
          tools: composer:v2

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP deps
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node deps
        run: npm ci

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
          if [ "$DB_CONNECTION" = "sqlite" ]; then
            touch database/database.sqlite
          fi

      - name: Run migrations + seed
        run: php artisan migrate --seed --force

      - name: Build frontend
        run: npm run build

      - name: WCAG 2.1 AA static audit
        # Fails on any `error` severity finding — static scan only (axe-core
        # browser audit is a planned next addition). See docs/accessibility/
        # for the rule set and the conformance statement.
        run: php artisan a11y:audit

      - name: Run Pest
        run: vendor/bin/pest --colors=always
