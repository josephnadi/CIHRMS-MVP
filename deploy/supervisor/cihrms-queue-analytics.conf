; CIHRMS — analytics queue worker
; Place at /etc/supervisor/conf.d/cihrms-queue-analytics.conf

[program:cihrms-queue-analytics]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/cihrms/artisan queue:work --queue=analytics --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/cihrms/queue-analytics.log
stopwaitsecs=3600
